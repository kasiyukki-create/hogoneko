<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESCUE & CONNECT | 野良猫保護プロジェクト</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Noto+Sans+JP:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar">
    <div class="logo">RESCUE <span>&</span> CONNECT</div>
    <ul class="nav-links">
        <li><a href="#about">MISSION</a></li>
        <li><a href="#cats">ADOPTION</a></li>
        <li><a href="#contact">CONTACT</a></li>
    </ul>
</nav>

<section class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <p class="sub-title">FOR THE SMALL LIVES</p>
        <h1>命をつなぐ、<br>静かな意志。</h1>
        <a href="#cats" class="main-btn">VIEW KITTENS</a>
    </div>
</section>

<section id="cats" class="container">
    <div class="section-header">
        <span class="en-title">ADOPTION</span>
        <h2>家族を待つ命</h2>
    </div>
    
    <div class="cat-grid">
        <div class="cat-item">
            <div class="img-wrapper">
                <img src="https://images.unsplash.com/photo-1592194996308-7b43878e84a6?auto=format&fit=crop&w=800&q=80" alt="子猫">
                <div class="overlay-info">VIEW DETAILS</div>
            </div>
            <div class="item-body">
                <h3>Miku</h3>
                <p>3 Months / Female</p>
            </div>
        </div>
        <div class="cat-item">
            <div class="img-wrapper">
                <img src="https://images.unsplash.com/photo-1574158622682-e40e69881006?auto=format&fit=crop&w=800&q=80" alt="子猫">
                <div class="overlay-info">VIEW DETAILS</div>
            </div>
            <div class="item-body">
                <h3>Leo</h3>
                <p>2 Months / Male</p>
            </div>
        </div>
    </div>
</section>

<footer>
    <div class="footer-content">
        <p class="footer-logo">RESCUE & CONNECT</p>
        <p class="copyright">&copy; 2026 NPO Stray Cat Rescue Project.</p>
    </div>
</footer>

</body>
</html>
